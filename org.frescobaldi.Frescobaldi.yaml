---
app-id: org.frescobaldi.Frescobaldi

# Known problems:
# - Documentation browser is not working. See issue https://github.com/frescobaldi/frescobaldi/issues/919 (fixed in master).
# - Clicking on the print button will crash the application. See issue https://github.com/frescobaldi/frescobaldi/issues/1221

runtime: org.kde.Platform
runtime-version: '5.13'
sdk: org.kde.Sdk

command: frescobaldi
rename-desktop-file: frescobaldi.desktop
rename-icon: frescobaldi

finish-args:
  - --share=ipc
  - --share=network
  - --device=all
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=x11
  - --env=QT_QPA_PLATFORM=xcb
  - --filesystem=host
  - --env=PATH=/usr/bin:/app/bin:/app/bin/x86_64-linux

modules:
  - lilypond.yaml
  - frescobaldi.yaml
